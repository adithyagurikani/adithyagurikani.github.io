<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a6b3c"/>
      <stop offset="100%" stop-color="#155730"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>
  <!-- Letter A - elegant serif style -->
  <text x="32" y="46" 
    font-family="Georgia, 'Playfair Display', serif" 
    font-weight="700" 
    font-size="38" 
    fill="#ffffff" 
    text-anchor="middle" 
    letter-spacing="-2">AG</text>
  <!-- Subtle accent dot -->
  <circle cx="52" cy="16" r="3" fill="#86e8b0" opacity="0.9"/>
</svg>
